<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Discord Clone</title>
    <style>
        :root {
            --bg-dark: #1e1f22; --bg-medium: #2b2d31; --bg-light: #313338;
            --bg-modifier: #383a40; --text-muted: #949ba4;
            --discord-blue: #5865f2; --discord-green: #23a559; --discord-red: #da373c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-light); color: white; overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; }

        /* SIDEBARS */
        .server-list { width: 72px; background-color: var(--bg-dark); display: flex; flex-direction: column; align-items: center; padding-top: 12px; flex-shrink: 0; }
        .server-icon { width: 48px; height: 48px; background-color: var(--bg-light); border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; position: relative;}
        .server-icon:hover, .server-icon.active { border-radius: 30%; background-color: var(--discord-blue); }
        
        .channel-list { width: 240px; background-color: var(--bg-medium); display: flex; flex-direction: column; position: relative; }
        
        /* HEADER & DROPDOWN */
        .server-header { padding: 12px 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .server-header:hover { background-color: rgba(255,255,255,0.05); }
        
        .dropdown-menu { position: absolute; top: 50px; left: 10px; width: 220px; background: #111214; border-radius: 4px; padding: 8px; display: none; flex-direction: column; z-index: 100; box-shadow: 0 8px 16px rgba(0,0,0,0.24); }
        .dropdown-item { padding: 8px; border-radius: 2px; cursor: pointer; font-size: 14px; color: var(--text-muted); }
        .dropdown-item:hover { background: var(--discord-blue); color: white; }
        .dropdown-item.danger:hover { background: var(--discord-red); }

        /* CHANNELS */
        .channel-section { margin-top: 20px; padding: 0 8px; }
        .section-label { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; padding: 0 8px; }
        .channel-item { padding: 6px 8px; margin: 2px 0; border-radius: 4px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; }
        .channel-item:hover, .channel-item.active { background: var(--bg-modifier); color: white; }
        .channel-item::before { content: '#'; margin-right: 8px; font-size: 18px; color: var(--text-muted); }
        .channel-item.voice::before { content: '🔊'; font-size: 14px; }

        /* MAIN CHAT */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 12px 16px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .message-history { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .input-box { padding: 16px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--bg-light); padding: 24px; border-radius: 8px; width: 440px; }
        .modal-btn { background: var(--discord-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        select, input.modal-input { width: 100%; padding: 10px; margin: 10px 0; background: var(--bg-dark); color: white; border: 1px solid #111; border-radius: 4px; box-sizing: border-box;}
    </style>
</head>
<body>

<div class="app-container">
    <nav class="server-list" id="server-nav">
        <div class="server-icon active" data-name="Community Hub">CH</div>
        <div class="server-icon" style="color: var(--discord-green)" onclick="showModal('server-modal')">+</div>
    </nav>

    <aside class="channel-list">
        <div class="server-header" onclick="toggleDropdown()">
            <span id="current-server-name">Community Hub</span>
            <span>v</span>
        </div>
        
        <div class="dropdown-menu" id="server-dropdown">
            <div class="dropdown-item" onclick="showModal('channel-modal')">Create Channel</div>
            <div class="dropdown-item" onclick="showModal('role-modal')">Server Settings (Roles)</div>
            <div class="dropdown-item">Invite People</div>
            <div class="dropdown-item danger">Leave Server</div>
        </div>

        <div class="channel-section">
            <div class="section-label">Text Channels <span>+</span></div>
            <div id="text-channels">
                <div class="channel-item active">general</div>
            </div>
        </div>
        <div class="channel-section">
            <div class="section-label">Voice Channels <span>+</span></div>
            <div id="voice-channels">
                <div class="channel-item voice">Lounge</div>
            </div>
        </div>
    </aside>

    <main class="chat-area">
        <div class="chat-header" id="chat-header-title"># general</div>
        <div class="message-history" id="chat-box"></div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Message #general">
        </div>
    </main>
</div>

<div class="modal-overlay" id="server-modal">
    <div class="modal">
        <h2>Create Server</h2>
        <input class="modal-input" id="new-server-name" placeholder="Server Name (e.g. Gamers)">
        <button class="modal-btn" onclick="createServer()">Create Server</button>
    </div>
</div>

<div class="modal-overlay" id="channel-modal">
    <div class="modal">
        <h2>Create Channel</h2>
        <input class="modal-input" id="new-channel-name" placeholder="channel-name">
        <select id="new-channel-type">
            <option value="text">Text Channel</option>
            <option value="voice">Voice Channel</option>
        </select>
        <button class="modal-btn" onclick="createChannel()">Create Channel</button>
    </div>
</div>

<div class="modal-overlay" id="role-modal">
    <div class="modal">
        <h2>Role Permissions</h2>
        <div style="text-align: left; font-size: 14px;">
            <label><input type="checkbox" checked> Send Messages</label><br>
            <label><input type="checkbox"> Manage Channels</label><br>
            <label><input type="checkbox"> Kick Members</label>
        </div>
        <button class="modal-btn" onclick="closeModals()">Save Roles</button>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let servers = JSON.parse(localStorage.getItem('discord_clone_data')) || [
        { name: 'Community Hub', channels: [{name: 'general', type: 'text'}, {name: 'Lounge', type: 'voice'}] }
    ];
    let activeServerIndex = 0;

    // --- UI HELPERS ---
    function toggleDropdown() {
        const menu = document.getElementById('server-dropdown');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function showModal(id) {
        document.getElementById(id).style.display = 'flex';
        if(id === 'server-dropdown') toggleDropdown();
    }

    function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
    }

    window.onclick = (e) => { 
        if (e.target.classList.contains('modal-overlay')) closeModals();
        if (!e.target.closest('.server-header')) document.getElementById('server-dropdown').style.display = 'none';
    };

    // --- LOGIC ---
    function render() {
        // Render Servers
        const nav = document.getElementById('server-nav');
        nav.innerHTML = '';
        servers.forEach((s, i) => {
            const icon = document.createElement('div');
            icon.className = `server-icon ${i === activeServerIndex ? 'active' : ''}`;
            icon.innerText = s.name.substring(0, 2).toUpperCase();
            icon.onclick = () => { activeServerIndex = i; render(); };
            nav.appendChild(icon);
        });
        nav.innerHTML += `<div class="server-icon" style="color: var(--discord-green)" onclick="showModal('server-modal')">+</div>`;

        // Render Channels
        const server = servers[activeServerIndex];
        document.getElementById('current-server-name').innerText = server.name;
        
        const textContainer = document.getElementById('text-channels');
        const voiceContainer = document.getElementById('voice-channels');
        textContainer.innerHTML = ''; voiceContainer.innerHTML = '';

        server.channels.forEach(ch => {
            const item = document.createElement('div');
            item.className = `channel-item ${ch.type === 'voice' ? 'voice' : ''}`;
            item.innerText = ch.name;
            item.onclick = () => {
                document.getElementById('chat-header-title').innerText = (ch.type === 'text' ? '# ' : '🔊 ') + ch.name;
                document.getElementById('chat-input').placeholder = `Message ${ch.name}`;
            };
            (ch.type === 'text' ? textContainer : voiceContainer).appendChild(item);
        });

        localStorage.setItem('discord_clone_data', JSON.stringify(servers));
    }

    function createServer() {
        const name = document.getElementById('new-server-name').value;
        if(!name) return;
        servers.push({ name, channels: [{name: 'general', type: 'text'}] });
        activeServerIndex = servers.length - 1;
        closeModals();
        render();
    }

    function createChannel() {
        const name = document.getElementById('new-channel-name').value;
        const type = document.getElementById('new-channel-type').value;
        if(!name) return;
        servers[activeServerIndex].channels.push({ name, type });
        closeModals();
        render();
    }

    // Initial Chat Mock
    document.getElementById('chat-input').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            const m = document.createElement('div');
            m.innerHTML = `<strong>You:</strong> ${e.target.value}`;
            document.getElementById('chat-box').appendChild(m);
            e.target.value = '';
        }
    }

    render();
</script>
</body>
</html>
