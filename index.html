<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord UI Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <nav class="server-list">
            <div class="server-icon home">DM</div>
            <hr>
            <div class="server-icon">G</div>
            <div class="server-icon">JS</div>
            <div class="server-icon plus">+</div>
        </nav>

        <aside class="channel-list">
            <header class="server-header">Project Workspace</header>
            <div class="channels">
                <div class="channel-item active"># general</div>
                <div class="channel-item"># resources</div>
                <div class="channel-item"># off-topic</div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header"># general</header>
            <div class="message-history">
                <div class="message">
                    <span class="user">Gemini:</span> 
                    <span class="text">Welcome to the GitHub Pages clone!</span>
                </div>
            </div>
            <div class="input-container">
                <input type="text" placeholder="Message #general">
            </div>
        </main>
    </div>
</body>
</html>
