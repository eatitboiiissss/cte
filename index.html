<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Fully Functional</title>
    <style>
        :root {
            --bg-dark: #202225; --bg-medium: #2f3136; --bg-light: #36393f;
            --bg-modifier: #40444b; --text-muted: #8e9297;
            --discord-blue: #5865f2; --discord-green: #3ba55c;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-light); color: white; overflow: hidden;
        }

        .app-container { display: flex; height: 100vh; }

        /* SERVER SIDEBAR */
        .server-list {
            width: 72px; background-color: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; padding-top: 12px;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px; height: 48px; background-color: var(--bg-light);
            border-radius: 50%; margin-bottom: 8px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; 
            transition: all 0.2s ease; font-weight: bold; font-size: 14px;
        }

        .server-icon:hover, .server-icon.active { border-radius: 30%; background-color: var(--discord-blue); }
        .server-icon.plus { color: var(--discord-green); font-size: 24px; }
        .server-icon.plus:hover { background-color: var(--discord-green); color: white; }

        /* CHANNEL SIDEBAR */
        .channel-list { width: 240px; background-color: var(--bg-medium); display: flex; flex-direction: column; }
        .server-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #202225; }
        .channel-item { padding: 8px 10px; color: var(--text-muted); cursor: pointer; border-radius: 4px; margin: 2px 8px; }
        .channel-item.active, .channel-item:hover { background-color: #393c43; color: white; }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #26272b; }
        .message-history { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .input-container { padding: 20px; }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: var(--bg-modifier); color: white; outline: none; box-sizing: border-box;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal { background: var(--bg-light); padding: 25px; border-radius: 8px; width: 350px; text-align: center; }
        .modal input { width: 90%; padding: 10px; margin: 15px 0; background: var(--bg-dark); color: white; border: 1px solid #111; border-radius: 4px; }
        .btn-create { background: var(--discord-blue); color: white; border: none; padding: 12px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; }

        hr { border: 0; border-top: 2px solid #36393f; width: 32px; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="server-list" id="server-nav">
        <div class="server-icon active" data-name="Home Server">H</div>
        <hr>
        <div class="server-icon plus" id="open-modal">+</div>
    </nav>

    <aside class="channel-list">
        <header class="server-header" id="server-title">Home Server</header>
        <div id="channel-container">
            <div class="channel-item active"># general</div>
            <div class="channel-item"># rules</div>
        </div>
    </aside>

    <main class="chat-area">
        <header class="chat-header" id="chat-title"># general</header>
        <div class="message-history" id="chat-box">
            <div style="color:var(--text-muted)">Welcome to the server!</div>
        </div>
        <div class="input-container">
            <input type="text" id="msg-input" placeholder="Message #general">
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2>Create Server</h2>
        <input type="text" id="new-server-name" placeholder="Enter 2 Letters (e.g. JS)" maxlength="2">
        <button class="btn-create" id="create-btn">Create</button>
    </div>
</div>

<script>
    // --- ELEMENTS ---
    const serverNav = document.getElementById('server-nav');
    const serverTitle = document.getElementById('server-title');
    const modal = document.getElementById('modal');
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');

    // --- 1. SERVER CLICKS (Event Delegation) ---
    serverNav.addEventListener('click', (e) => {
        const icon = e.target.closest('.server-icon');
        if (!icon || icon.id === 'open-modal') return;

        // Update Active State
        document.querySelectorAll('.server-icon').forEach(i => i.classList.remove('active'));
        icon.classList.add('active');

        // Update UI
        serverTitle.innerText = icon.dataset.name || (icon.innerText + " Server");
    });

    // --- 2. MODAL LOGIC ---
    document.getElementById('open-modal').onclick = () => modal.style.display = 'flex';
    
    document.getElementById('create-btn').onclick = () => {
        const name = document.getElementById('new-server-name').value.toUpperCase();
        if (!name) return;

        const newIcon = document.createElement('div');
        newIcon.className = 'server-icon';
        newIcon.innerText = name;
        newIcon.dataset.name = name + " Server";

        serverNav.insertBefore(newIcon, document.getElementById('open-modal'));
        modal.style.display = 'none';
        document.getElementById('new-server-name').value = "";
    };

    // --- 3. CHANNEL CLICKS ---
    document.getElementById('channel-container').addEventListener('click', (e) => {
        const item = e.target.closest('.channel-item');
        if (!item) return;

        document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
        item.classList.add('active');
        document.getElementById('chat-title').innerText = item.innerText;
        msgInput.placeholder = `Message ${item.innerText}`;
    });

    // --- 4. CHAT LOGIC ---
    msgInput.onkeypress = (e) => {
        if (e.key === 'Enter' && msgInput.value.trim() !== "") {
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            div.innerHTML = `<strong>You:</strong> <span>${msgInput.value}</span>`;
            chatBox.appendChild(div);
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };

    // Close modal if clicking outside
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
</script>

</body>
</html>
