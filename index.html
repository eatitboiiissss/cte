<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Emergency Fix</title>
    <style>
        :root { --bg-1: #1e1f22; --bg-2: #2b2d31; --bg-3: #313338; --blue: #5865f2; --green: #23a559; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-3); color: white; overflow: hidden; }
        .app { display: flex; height: 100vh; }
        .s-sidebar { width: 72px; background: var(--bg-1); display: flex; flex-direction: column; align-items: center; padding-top: 12px; flex-shrink: 0; }
        .c-sidebar { width: 240px; background: var(--bg-2); display: flex; flex-direction: column; }
        .icon { width: 48px; height: 48px; background: var(--bg-3); border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .icon:hover, .icon.active { border-radius: 30%; background: var(--blue); }
        .chat { flex-grow: 1; display: flex; flex-direction: column; }
        .messages { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .input-box { padding: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 99; }
        .m-box { background: var(--bg-3); padding: 25px; border-radius: 8px; width: 300px; }
        button { width: 100%; padding: 10px; background: var(--blue); color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <nav class="s-sidebar" id="s-list">
        <div class="icon" style="color:var(--green)" onclick="toggleM('s-modal', true)">+</div>
    </nav>
    <aside class="c-sidebar">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #111" id="s-name">Select Server</div>
        <div id="c-list" style="flex-grow:1; padding:10px"></div>
        <button onclick="toggleM('c-modal', true)" style="margin:10px; width:auto; font-size:11px">ADD CHANNEL</button>
    </aside>
    <main class="chat">
        <div class="messages" id="m-list"></div>
        <div class="input-box">
            <input type="text" id="chat-in" placeholder="Message..." disabled>
        </div>
    </main>
</div>

<div class="modal" id="s-modal"><div class="m-box"><h3>New Server</h3><input type="text" id="s-in"><button onclick="fnCreateServer()">Create</button></div></div>
<div class="modal" id="c-modal"><div class="m-box"><h3>New Channel</h3><input type="text" id="c-in"><button onclick="fnCreateChannel()">Create</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _URL = 'https://febhrveozrhiwyjtiksz.supabase.co';
    const _KEY = 'sb_secret_itqn0Ehpah6_IK20xmubiA_E39sASI3';
    const client = supabase.createClient(_URL, _KEY);

    let curS = null;
    let curC = null;

    // --- BUTTON: CREATE SERVER ---
    async function fnCreateServer() {
        const val = document.getElementById('s-in').value;
        if(!val) return;
        toggleM('s-modal', false);

        const { data, error } = await client.from('servers').insert([{ name: val }]).select();
        if(error) { console.error(error); alert("DB Error: " + error.message); return; }
        
        // Auto-create General Channel
        await client.from('channels').insert([{ server_id: data[0].id, name: 'general' }]);
        loadEverything();
    }

    // --- BUTTON: CREATE CHANNEL ---
    async function fnCreateChannel() {
        const val = document.getElementById('c-in').value;
        if(!val || !curS) return;
        toggleM('c-modal', false);

        const { error } = await client.from('channels').insert([{ server_id: curS.id, name: val }]);
        if(error) console.error(error);
        loadChannels(curS.id);
    }

    // --- LOAD DATA ---
    async function loadEverything() {
        const { data } = await client.from('servers').select('*');
        const list = document.getElementById('s-list');
        list.querySelectorAll('.icon:not([onclick])').forEach(n => n.remove());
        data?.forEach(s => {
            const div = document.createElement('div');
            div.className = 'icon';
            div.innerText = s.name.substring(0,2).toUpperCase();
            div.onclick = () => { curS = s; selectServer(s); };
            list.prepend(div);
        });
    }

    async function selectServer(s) {
        document.getElementById('s-name').innerText = s.name;
        loadChannels(s.id);
    }

    async function loadChannels(sid) {
        const { data } = await client.from('channels').select('*').eq('server_id', sid);
        const list = document.getElementById('c-list');
        list.innerHTML = '';
        data?.forEach(ch => {
            const div = document.createElement('div');
            div.style.padding = '8px';
            div.style.cursor = 'pointer';
            div.innerText = '# ' + ch.name;
            div.onclick = () => selectChannel(ch);
            list.appendChild(div);
        });
    }

    async function selectChannel(ch) {
        curC = ch;
        document.getElementById('chat-in').disabled = false;
        document.getElementById('chat-in').placeholder = `Message #${ch.name}`;
        loadMessages(ch.id);
    }

    async function loadMessages(cid) {
        const { data } = await client.from('messages').select('*').eq('channel_id', cid).order('created_at');
        const list = document.getElementById('m-list');
        list.innerHTML = '';
        data?.forEach(m => {
            const d = document.createElement('div');
            d.innerHTML = `<b>${m.username}:</b> ${m.content}`;
            list.appendChild(d);
        });
        list.scrollTop = list.scrollHeight;
    }

    // --- CHAT INPUT ---
    document.getElementById('chat-in').onkeypress = async (e) => {
        if(e.key === 'Enter' && e.target.value) {
            const txt = e.target.value; e.target.value = '';
            await client.from('messages').insert([{ 
                channel_id: curC.id, server_id: curS.id, username: 'Admin', content: txt 
            }]);
            loadMessages(curC.id);
        }
    };

    function toggleM(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    
    loadEverything();
</script>
</body>
</html>
