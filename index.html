<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Live Discord Server</title>
    <style>
        :root {
            --bg-dark: #1e1f22; --bg-medium: #2b2d31; --bg-light: #313338;
            --bg-modifier: #383a40; --text-muted: #949ba4;
            --discord-blue: #5865f2; --discord-green: #23a559;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-light); color: white; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebar */
        .server-list { width: 72px; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; padding-top: 12px; flex-shrink: 0; }
        .server-icon { width: 48px; height: 48px; background: var(--bg-light); border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .server-icon:hover, .server-icon.active { border-radius: 30%; background: var(--discord-blue); }
        .plus-btn { color: var(--discord-green); font-size: 24px; }
        
        /* Channels */
        .channel-list { width: 240px; background: var(--bg-medium); display: flex; flex-direction: column; }
        .server-header { padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.2); font-size: 16px; }

        /* Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); color: white; }
        .chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 4px; }
        .msg b { color: var(--discord-blue); margin-right: 8px; }
        
        .input-area { padding: 20px; background: var(--bg-light); }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; box-sizing: border-box; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg-light); padding: 24px; border-radius: 8px; width: 320px; text-align: center; }
        .modal-btn { margin-top: 15px; width: 100%; padding: 10px; background: var(--discord-blue); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="server-list" id="server-nav">
        <div class="server-icon plus-btn" onclick="openModal()">+</div>
    </nav>
    <aside class="channel-list">
        <div class="server-header" id="active-server-name">Welcome</div>
        <div style="padding: 10px; color: var(--text-muted); font-size: 14px;"># general</div>
    </aside>
    <main class="chat-area">
        <div class="chat-header" id="chat-header"># select-a-server</div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Select a server to chat..." disabled>
        </div>
    </main>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Create New Server</h3>
        <input type="text" id="new-server-name" placeholder="Server Name">
        <button class="modal-btn" onclick="createServer()">Create Server</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://febhrveozrhiwyjtiksz.supabase.co';
    const SUPABASE_KEY = 'sb_secret_itqn0Ehpah6_IK20xmubiA_E39sASI3';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentServerId = null;

    // --- INITIALIZE ---
    async function init() {
        await loadServers();
        subscribeToMessages();
    }

    // --- SERVER LOGIC ---
    async function loadServers() {
        const { data } = await supabase.from('servers').select('*').order('created_at', {ascending: true});
        const nav = document.getElementById('server-nav');
        const plus = nav.querySelector('.plus-btn');
        
        // Clear icons except plus
        nav.querySelectorAll('.server-icon:not(.plus-btn)').forEach(el => el.remove());
        
        data?.forEach(s => {
            const icon = document.createElement('div');
            icon.className = 'server-icon';
            icon.innerText = s.name.substring(0,2).toUpperCase();
            icon.onclick = () => selectServer(s);
            nav.insertBefore(icon, plus);
        });
    }

    async function createServer() {
        const name = document.getElementById('new-server-name').value;
        if (!name) return;
        const { data } = await supabase.from('servers').insert([{ name }]).select();
        closeModal();
        loadServers();
    }

    async function selectServer(server) {
        currentServerId = server.id;
        document.getElementById('active-server-name').innerText = server.name;
        document.getElementById('chat-header').innerText = `# general`;
        const input = document.getElementById('chat-input');
        input.disabled = false;
        input.placeholder = `Message ${server.name}`;
        
        // Load messages for this server
        const { data } = await supabase.from('messages')
            .select('*')
            .eq('server_id', server.id)
            .order('created_at', {ascending: true});
        
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML = '';
        data?.forEach(msg => appendMessage(msg));
    }

    // --- CHAT LOGIC ---
    function appendMessage(msg) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<b>${msg.username}:</b> ${msg.content}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('chat-input').onkeypress = async (e) => {
        if (e.key === 'Enter' && e.target.value && currentServerId) {
            const text = e.target.value;
            e.target.value = '';
            await supabase.from('messages').insert([{
                server_id: currentServerId,
                username: 'Guest_' + Math.floor(Math.random()*1000),
                content: text
            }]);
        }
    };

    function subscribeToMessages() {
        supabase.channel('custom-all-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            if (payload.new.server_id === currentServerId) {
                appendMessage(payload.new);
            }
        }).subscribe();
    }

    // --- MODAL HELPERS ---
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if (e.target.id === 'modal') closeModal(); }

    init();
</script>
</body>
</html>
