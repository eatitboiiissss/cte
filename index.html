<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Discord Clone - Fixed</title>
    <style>
        :root {
            --bg-dark: #1e1f22; --bg-medium: #2b2d31; --bg-light: #313338;
            --bg-modifier: #383a40; --text-muted: #949ba4;
            --discord-blue: #5865f2; --discord-green: #23a559;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg-light); color: white; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        
        /* Sidebars */
        .server-list { width: 72px; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; padding-top: 12px; flex-shrink: 0; border-right: 1px solid #111; }
        .server-icon { width: 48px; height: 48px; background: var(--bg-light); border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .server-icon:hover, .server-icon.active { border-radius: 30%; background: var(--discord-blue); }
        
        .channel-sidebar { width: 240px; background: var(--bg-medium); display: flex; flex-direction: column; }
        .server-header { padding: 12px 16px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.2); cursor: pointer; }
        .channel-item { padding: 8px; margin: 2px 8px; color: var(--text-muted); cursor: pointer; border-radius: 4px; }
        .channel-item:hover, .channel-item.active { background: var(--bg-modifier); color: white; }

        /* Chat */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .input-area { padding: 20px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #383a40; color: white; outline: none; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-box { background: var(--bg-light); padding: 25px; border-radius: 8px; width: 300px; text-align: center; }
        .btn { width: 100%; padding: 10px; background: var(--discord-blue); color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="server-list" id="server-nav">
        <div class="server-icon" style="color: var(--discord-green)" onclick="openModal('s-modal')">+</div>
    </nav>
    <aside class="channel-sidebar">
        <div class="server-header" id="s-header">Select Server</div>
        <div id="c-list" style="margin-top:10px"></div>
        <button class="btn" style="width:90%; margin: 10px auto; font-size:12px;" onclick="openModal('c-modal')">Add Channel</button>
    </aside>
    <main class="chat-area">
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Select a channel..." disabled>
        </div>
    </main>
</div>

<div class="modal" id="s-modal"><div class="modal-box"><h3>New Server</h3><input type="text" id="s-input"><button class="btn" onclick="actCreateServer()">Create</button></div></div>
<div class="modal" id="c-modal"><div class="modal-box"><h3>New Channel</h3><input type="text" id="c-input"><button class="btn" onclick="actCreateChannel()">Create</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabase = supabase.createClient('https://febhrveozrhiwyjtiksz.supabase.co', 'sb_secret_itqn0Ehpah6_IK20xmubiA_E39sASI3');
    let selServer = null;
    let selChannel = null;

    async function start() {
        await loadS();
        // Realtime listener
        supabase.channel('msgs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
            if(selChannel && p.new.channel_id === selChannel.id) append(p.new);
        }).subscribe();
    }

    async function loadS() {
        const { data, error } = await supabase.from('servers').select('*');
        if(error) console.error(error);
        const nav = document.getElementById('server-nav');
        nav.querySelectorAll('.server-icon:not([onclick])').forEach(n => n.remove());
        data?.forEach(s => {
            const div = document.createElement('div');
            div.className = 'server-icon';
            div.innerText = s.name.substring(0,2).toUpperCase();
            div.onclick = () => selectS(s);
            nav.prepend(div);
        });
    }

    async function actCreateServer() {
        const name = document.getElementById('s-input').value;
        const { data, error } = await supabase.from('servers').insert([{ name }]).select();
        if(data) {
            await supabase.from('channels').insert([{ server_id: data[0].id, name: 'general' }]);
            location.reload(); 
        }
    }

    async function selectS(s) {
        selServer = s;
        document.getElementById('s-header').innerText = s.name;
        const { data } = await supabase.from('channels').select('*').eq('server_id', s.id);
        const list = document.getElementById('c-list');
        list.innerHTML = '';
        data?.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerText = '# ' + ch.name;
            div.onclick = () => selectC(ch);
            list.appendChild(div);
        });
    }

    async function actCreateChannel() {
        if(!selServer) return alert("Select a server first!");
        const name = document.getElementById('c-input').value;
        await supabase.from('channels').insert([{ server_id: selServer.id, name }]);
        selectS(selServer);
        closeModals();
    }

    async function selectC(ch) {
        selChannel = ch;
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-input').placeholder = `Message #${ch.name}`;
        const { data } = await supabase.from('messages').select('*').eq('channel_id', ch.id).order('created_at');
        document.getElementById('chat-box').innerHTML = '';
        data?.forEach(m => append(m));
    }

    function append(m) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.innerHTML = `<b style="color:var(--discord-blue)">${m.username}:</b> ${m.content}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    document.getElementById('chat-input').onkeypress = async (e) => {
        if(e.key === 'Enter' && e.target.value && selChannel) {
            const content = e.target.value; e.target.value = '';
            await supabase.from('messages').insert([{ 
                channel_id: selChannel.id, server_id: selServer.id,
                username: 'Admin', content 
            }]);
        }
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    window.onclick = (e) => { if(e.target.className === 'modal') closeModals(); }

    start();
</script>
</body>
</html>
