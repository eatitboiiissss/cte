<style>
    /* New Discord-style features */
    .channel.voice::before { content: '🔊'; margin-right: 5px; }
    .channel.forum::before { content: '📁'; margin-right: 5px; }
    .channel.announcement::before { content: '📢'; margin-right: 5px; }
    
    .role-badge { 
        padding: 2px 6px; 
        border-radius: 4px; 
        font-size: 10px; 
        margin-left: 5px;
        background: rgba(255,255,255,0.1);
    }

    /* Analytics Dashboard (Hidden by default) */
    #analytics-layer {
        position: fixed; inset: 0; background: var(--bg3);
        display: none; padding: 40px; z-index: 500;
    }
</style>

<div id="analytics-layer">
    <h1>Server Insights</h1>
    <div id="stat-joins">Total Joins: 0</div>
    <button onclick="closeAnalytics()">Close</button>
</div>

<script>
    // Handle Rules Screening
    function acceptRules() {
        document.getElementById('rules-screen').style.display = 'none';
        socket.emit('onboarding-complete');
    }

    // Role-based UI
    function applyPermissions(userRoles) {
        if (!userRoles.includes('Admin')) {
            document.getElementById('admin-tools').style.display = 'none';
        }
    }

    // YouTube Integration (Simple Embed)
    function shareYouTube(url) {
        const videoId = url.split('v=')[1];
        const embed = `<iframe src="https://www.youtube.com/embed/${videoId}"></iframe>`;
        socket.emit('send-chat', { text: embed, user: 'System' });
    }
</script>
